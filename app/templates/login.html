<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Money Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .neumorphic-card { background: #1a1a1a; border-radius: 40px; box-shadow: 15px 15px 30px #0d0d0d, -15px -15px 30px #272727; padding: 60px; width: 100%; max-width: 600px; border: none; }
        h2 { font-size: 2.5rem; font-weight: 600; margin-bottom: 40px !important; color: #a855f7; }
        .form-label { font-size: 1.2rem; margin-bottom: 10px; color: #bbb; }
        .form-control { background: #1a1a1a; border: none; border-radius: 20px; box-shadow: inset 8px 8px 16px #0d0d0d, inset -8px -8px 16px #272727; color: #ffffff !important; padding: 18px 25px; font-size: 1.1rem; margin-bottom: 25px; }
        .form-control:focus { background: #1a1a1a; box-shadow: inset 4px 4px 8px #0d0d0d, inset -4px -4px 8px #272727, 0 0 15px rgba(168, 85, 247, 0.5); outline: none; border: 1px solid rgba(168, 85, 247, 0.7); }
        .btn-purple { background: #1a1a1a; color: #a855f7 !important; border: none; border-radius: 20px; box-shadow: 8px 8px 16px #0d0d0d, -8px -8px 16px #272727; padding: 18px; width: 100%; font-size: 1.3rem; font-weight: 600; transition: 0.3s; margin-top: 15px; }
        .btn-purple:active { box-shadow: inset 8px 8px 16px #0d0d0d, inset -8px -8px 16px #272727; transform: scale(0.97); }
        .link-text { color: #888; text-decoration: none; font-size: 1.1rem; transition: 0.3s; }
        .link-text:hover { color: #a855f7; }
    </style>
</head>
<body>
    <div class="neumorphic-card">
        <h2 class="text-center">เข้าสู่ระบบ</h2>
        <form action="{{ url_for('main.login') }}" method="POST">
            <div class="mb-4">
                <label class="form-label">ชื่อผู้ใช้งาน</label>
                <input type="text" name="username" class="form-control" required placeholder="Username">
            </div>
            <div class="mb-4">
                <label class="form-label">รหัสผ่าน</label>
                <input type="password" name="password" class="form-control" required placeholder="Password">
            </div>
            <button type="submit" class="btn-purple">เข้าสู่ระบบ</button>
        </form>
        <div class="text-center mt-5">
            <a href="{{ url_for('main.register') }}" class="link-text">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</a>
        </div>
    </div>
</body>
</html>
