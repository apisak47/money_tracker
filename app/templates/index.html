<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center">
        <h2>💰 บันทึกรายรับ-รายจ่ายของ {{ current_user.username }}</h2>
        <a href="{{ url_for('main.logout') }}" class="btn btn-outline-danger btn-sm">ออกจากระบบ</a>
    </div>

    <form method="POST" class="row g-3 my-4 card card-body flex-row shadow-sm">
        <div class="col-md-6"><input type="text" name="title" class="form-control" placeholder="รายการ" required></div>
        <div class="col-md-4"><input type="number" step="0.01" name="amount" class="form-control" placeholder="จำนวนเงิน (รายจ่ายใส่ติดลบ)" required></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">บันทึก</button></div>
    </form>

    <table class="table table-hover mt-3">
        <thead class="table-dark">
            <tr><th>วันที่</th><th>รายการ</th><th>จำนวนเงิน</th><th>จัดการ</th></tr>
        </thead>
        <tbody>
            {% for tx in transactions %}
            <tr>
                <td>{{ tx.date.strftime('%d/%m/%Y') }}</td>
                <td>{{ tx.title }}</td>
                <td class="{{ 'text-danger' if tx.amount < 0 else 'text-success' }}">{{ "{:,.2f}".format(tx.amount) }}</td>
                <td><a href="{{ url_for('main.delete', id=tx.id) }}" class="btn btn-danger btn-sm">ลบ</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
