<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1e1e1e; color: #e0e0e0; font-family: 'Kanit', sans-serif; min-height: 100vh; padding: 20px; }
        .neumorphic-card { background: #1e1e1e; border-radius: 25px; box-shadow: 10px 10px 20px #151515, -10px -10px 20px #272727; padding: 30px; border: none; margin-bottom: 30px; }
        
        /* แก้จุดตาย: ตัวหนังสือสีขาวสว่างอ่านง่าย */
        .form-control { 
            background: #1e1e1e; 
            border: 1px solid transparent;
            border-radius: 12px; 
            box-shadow: inset 5px 5px 10px #151515, inset -5px -5px 10px #272727; 
            color: #ffffff !important; /* ขาวจั๊วะ */
            padding: 10px 15px; 
            transition: 0.3s;
        }
        /* ตอนกดพิมพ์ให้เรืองแสงสีม่วง */
        .form-control:focus { 
            background: #1e1e1e; 
            color: #ffffff !important; 
            box-shadow: inset 2px 2px 5px #151515, inset -2px -2px 5px #272727, 0 0 10px rgba(168, 85, 247, 0.4); 
            outline: none;
            border: 1px solid rgba(168, 85, 247, 0.6);
        }
        .form-control::placeholder { color: #888; }

        .btn-purple { background: #1e1e1e; color: #a855f7 !important; border: none; border-radius: 12px; box-shadow: 5px 5px 10px #151515, -5px -5px 10px #272727; padding: 10px 20px; transition: 0.3s; font-weight: 500; text-decoration: none; display: inline-block; cursor: pointer; }
        .btn-purple:active { box-shadow: inset 5px 5px 10px #151515, inset -5px -5px 10px #272727; transform: scale(0.95); }
        .btn-edit { color: #ffc107 !important; }
        .btn-delete { color: #ff5252 !important; }
        
        table { color: #e0e0e0 !important; border-collapse: separate; border-spacing: 0 15px; width: 100%; }
        tr { background: #1e1e1e; box-shadow: 5px 5px 10px #151515, -10px -10px 20px #272727; border-radius: 15px; }
        th, td { border: none; padding: 15px !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #a855f7;">🟣 Money Tracker: {{ current_user.username }}</h2>
        <a href="{{ url_for('main.logout') }}" style="color: #888; text-decoration: none;">ออกจากระบบ →</a>
    </div>

    <div class="neumorphic-card">
        <form action="{{ url_for('main.index') }}" method="GET" class="row g-3">
            <div class="col-md-10">
                <input type="text" name="search" class="form-control" placeholder="ค้นหาชื่อรายการ...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn-purple w-100">ค้นหา</button>
            </div>
        </form>
    </div>

    <div class="neumorphic-card">
        <h5 class="mb-3" style="color: #888;">เพิ่มรายการใหม่</h5>
        <form action="/add" method="POST" class="row g-3">
            <div class="col-md-5">
                <input type="text" name="title" class="form-control" placeholder="รายการของคุณ..." required>
            </div>
            <div class="col-md-4">
                <input type="number" step="0.01" name="amount" class="form-control" placeholder="จำนวนเงิน (ใส่ลบ - สำหรับรายจ่าย)" required>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn-purple w-100">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>รายการ</th>
                    <th>จำนวนเงิน</th>
                    <th class="text-center">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.date.strftime('%d/%m/%Y') if item.date else 'N/A' }}</td>
                    <td>{{ item.title }}</td>
                    <td style="color: {{ '#4CAF50' if item.amount > 0 else '#ff5252' }}">
                        {{ "{:,.2f}".format(item.amount) }} บาท
                    </td>
                    <td class="text-center">
                        <a href="{{ url_for('main.edit_transaction', id=item.id) }}" class="btn-purple btn-edit me-2">แก้ไข</a>
                        <a href="{{ url_for('main.delete_transaction', id=item.id) }}" class="btn-purple btn-delete" onclick="return confirm('ลบรายการนี้ใช่ไหม?')">ลบ</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
